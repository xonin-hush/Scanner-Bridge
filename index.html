<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .spinner {
            border: 3px solid #e5e7eb;
            border-top: 3px solid #4f46e5;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>

<body class="bg-gray-100 p-10 min-h-screen">

    <div class="max-w-5xl mx-auto bg-white p-8 rounded-lg shadow">

        <!-- Header -->
        <h1 class="text-3xl font-bold text-gray-800 mb-2">Document Scanner</h1>
        <p class="text-gray-600 mb-6">Scan or upload documents from your device.</p>

        <!-- Connection Indicator -->
        <div id="connectionStatus" class="p-3 bg-gray-100 rounded flex items-center gap-2 mb-8">
            <div class="spinner"></div>
            <span>Connecting to scanner bridge...</span>
        </div>

        <!-- Actions -->
        <div class="grid md:grid-cols-2 gap-6">

            <!-- Scan button -->
            <button id="scanBtn"
                onclick="handleScan()"
                disabled
                class="border-2 border-dashed p-8 rounded-lg text-center cursor-not-allowed opacity-60 bg-gray-50">
                <svg class="w-12 h-12 mx-auto mb-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                        d="M3 9a2 2 0 012-2h1a2 2 0 001.7-.9l.8-1.2A2 2 0 0110 4h4a2 2 0 011.7.9l.8 1.2A2 2 0 0018 7h1a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                        d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
                <h2 id="scanBtnLabel" class="text-xl font-semibold">Scan Document</h2>
                <p class="text-gray-500 text-sm">Requires ScannerBridge</p>
            </button>

            <!-- Upload -->
            <label class="border-2 border-dashed border-blue-300 p-8 rounded-lg text-center cursor-pointer hover:bg-blue-50">
                <svg class="w-12 h-12 mx-auto mb-3 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                        d="M7 16a4 4 0 01-.9-8A5 5 0 1116 6a5 5 0 011 10M15 13l-3-3-3 3m3-3v12"/>
                </svg>
                <h2 class="text-xl font-semibold">Upload Files</h2>
                <p class="text-gray-500 text-sm">Images or PDF</p>
                <input id="fileInput" type="file" multiple accept="image/*,.pdf" class="hidden" onchange="handleFileUpload(event)">
            </label>

        </div>

        <!-- Alert -->
        <div id="messageAlert" class="hidden p-4 rounded mt-8 fade-in"></div>

        <!-- Documents -->
        <div id="documentsSection" class="hidden mt-10">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-semibold">
                    Documents (<span id="docCount">0</span>)
                </h2>
                <button onclick="clearAllDocuments()" class="bg-gray-200 px-4 py-2 rounded hover:bg-gray-300">Clear All</button>
            </div>

            <div id="documentsGrid" class="grid md:grid-cols-3 gap-4"></div>
        </div>

        <!-- Instructions -->
        <div class="mt-12 p-6 bg-gray-50 rounded">
            <h3 class="font-semibold text-gray-800 mb-2">Setup Instructions</h3>
            <p class="text-gray-600 text-sm">
                • Install the ScannerBridge application<br>
                • Connect your USB scanner<br>
                • Use this page to scan or upload documents
            </p>
        </div>
    </div>


<script>
const CONFIG = {
    // Override with ?ws=ws://host:port when the bridge runs elsewhere
    WS_URL: new URLSearchParams(location.search).get("ws") || "ws://localhost:8765",
    MAX_FILE_SIZE: 10 * 1024 * 1024,
    RECONNECT_MIN_MS: 1000,
    RECONNECT_MAX_MS: 30000,
    // Slightly longer than the bridge's scan_timeout_seconds (300 s) so the
    // server-side timeout error normally arrives first.
    SCAN_TIMEOUT_MS: 330000,
    STORAGE_KEY: "scannerBridgeDocs"
};

let ws = null;
let connected = false;
let scanning = false;
let scannedDocs = [];
let reconnectDelay = CONFIG.RECONNECT_MIN_MS;
let reconnectTimer = null;
let scanTimeoutTimer = null;
let docSeq = 0;

/* Connect to bridge */
function connectToBridge() {
    clearTimeout(reconnectTimer);
    reconnectTimer = null;

    const socket = new WebSocket(CONFIG.WS_URL);
    ws = socket;

    socket.onopen = () => {
        reconnectDelay = CONFIG.RECONNECT_MIN_MS;
        updateConnection(true);
    };

    socket.onclose = () => {
        if (socket !== ws) return; // superseded by a newer connection
        scheduleReconnect();
    };

    socket.onerror = () => {
        console.warn("ScannerBridge socket error; waiting for close event");
    };

    socket.onmessage = (event) => {
        let data;
        try {
            data = JSON.parse(event.data);
        } catch (e) {
            console.warn("Ignoring malformed message from bridge", e);
            return;
        }
        handleServerMessage(data);
    };
}

function scheduleReconnect() {
    if (reconnectTimer) return; // never stack timers
    const delay = reconnectDelay;
    reconnectDelay = Math.min(reconnectDelay * 2, CONFIG.RECONNECT_MAX_MS);
    reconnectTimer = setTimeout(connectToBridge, delay);
    updateConnection(false, delay);
}

window.addEventListener("online", () => {
    if (!connected) {
        reconnectDelay = CONFIG.RECONNECT_MIN_MS;
        connectToBridge();
    }
});

function updateConnection(isConnected, retryDelayMs) {
    connected = isConnected;
    setScanning(false); // a fresh or lost connection can't have a scan pending
    const status = document.getElementById("connectionStatus");

    if (isConnected) {
        status.className = "p-3 bg-green-100 rounded flex items-center gap-2 mb-8";
        status.textContent = "✔ Connected to ScannerBridge";
    } else {
        status.className = "p-3 bg-red-100 rounded flex items-center gap-2 mb-8";
        status.textContent = retryDelayMs
            ? `✖ ScannerBridge Offline — retrying in ${Math.ceil(retryDelayMs / 1000)}s…`
            : "✖ ScannerBridge Offline";
    }
}

function setScanning(isScanning) {
    scanning = isScanning;
    clearTimeout(scanTimeoutTimer);
    scanTimeoutTimer = null;
    if (isScanning) {
        // Fallback in case neither scan_complete nor an error ever arrives
        scanTimeoutTimer = setTimeout(() => {
            setScanning(false);
            showMessage("No response from the scanner bridge. Please try again.", "red");
        }, CONFIG.SCAN_TIMEOUT_MS);
    }
    refreshScanButton();
}

function refreshScanButton() {
    const scanBtn = document.getElementById("scanBtn");
    const disabled = !connected || scanning;
    scanBtn.disabled = disabled;
    scanBtn.classList.toggle("cursor-not-allowed", disabled);
    scanBtn.classList.toggle("opacity-60", disabled);
    document.getElementById("scanBtnLabel").textContent =
        scanning ? "Scanning…" : "Scan Document";
}

function handleServerMessage(data) {
    if (data.type === "connected") {
        const status = document.getElementById("connectionStatus");
        // Keep the button usable even without a scanner: the bridge
        // re-detects hardware on every scan request.
        status.textContent = data.scanner_available
            ? `✔ Connected — scanner: ${data.scanner_name}`
            : "✔ Connected — no scanner detected; the bridge will look again when you scan";
    }
    if (data.type === "scanning") {
        setScanning(true);
    }
    if (data.type === "scan_complete") {
        setScanning(false);
        addDocument(data.image, "Scanned Document");
        showMessage("Document scanned successfully.", "green");
    }
    if (data.type === "error") {
        setScanning(false);
        showMessage(data.message, "red");
    }
}

/* Scan */
function handleScan() {
    if (!connected) {
        showMessage("ScannerBridge is not connected.", "red");
        return;
    }
    if (scanning) return;
    setScanning(true); // claim immediately so a double-click can't send twice
    ws.send(JSON.stringify({ type: "scan", dpi: 200 }));
}

/* Upload */
function handleFileUpload(evt) {
    const files = Array.from(evt.target.files);
    for (const f of files) {
        if (f.size > CONFIG.MAX_FILE_SIZE) {
            showMessage("File too large.", "red");
            continue;
        }
        const reader = new FileReader();
        reader.onload = e => addDocument(e.target.result, f.name);
        reader.readAsDataURL(f);
    }
}

/* Persistence: the gallery survives page reloads via localStorage */
function loadDocuments() {
    try {
        const raw = localStorage.getItem(CONFIG.STORAGE_KEY);
        scannedDocs = raw ? JSON.parse(raw) : [];
    } catch (e) {
        console.warn("Could not restore saved documents", e);
        scannedDocs = [];
    }
    docSeq = scannedDocs.length;
    updateDocuments();
}

function persistDocuments() {
    // On quota errors, persist as many of the newest documents as fit;
    // everything stays visible in the current session either way.
    const docs = [...scannedDocs];
    let evicted = 0;
    for (;;) {
        try {
            localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(docs));
            break;
        } catch (e) {
            if (docs.length === 0) {
                console.warn("Could not persist documents", e);
                break;
            }
            docs.shift();
            evicted++;
        }
    }
    if (evicted > 0) {
        showMessage(
            `Browser storage is full — the ${evicted} oldest document(s) won't survive a page refresh.`,
            "yellow"
        );
    }
}

/* Add Document */
function addDocument(data, name) {
    scannedDocs.push({ id: `${Date.now()}-${docSeq++}`, data, name });
    updateDocuments();
    persistDocuments();
}

function escapeHtml(value) {
    return String(value).replace(/[&<>"']/g, c => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
}

/* Document Display */
function updateDocuments() {
    const section = document.getElementById("documentsSection");
    const grid = document.getElementById("documentsGrid");
    const count = document.getElementById("docCount");

    count.textContent = scannedDocs.length;

    if (scannedDocs.length === 0) {
        section.classList.add("hidden");
        return;
    }
    section.classList.remove("hidden");

    grid.innerHTML = scannedDocs.map(doc => `
        <div class="bg-gray-50 rounded p-3 shadow relative">
            <button class="absolute top-2 right-2 text-red-500" onclick="removeDocument('${doc.id}')">✖</button>
            <img src="${doc.data}" class="w-full h-40 object-cover rounded mb-2">
            <p class="text-sm">${escapeHtml(doc.name)}</p>
        </div>
    `).join("");
}

function removeDocument(id) {
    scannedDocs = scannedDocs.filter(d => String(d.id) !== String(id));
    updateDocuments();
    persistDocuments();
}

function clearAllDocuments() {
    scannedDocs = [];
    updateDocuments();
    try {
        localStorage.removeItem(CONFIG.STORAGE_KEY);
    } catch (e) {
        console.warn("Could not clear saved documents", e);
    }
}

/* Alerts */
function showMessage(text, color="blue") {
    const alert = document.getElementById("messageAlert");
    alert.className = `p-4 rounded mt-8 fade-in bg-${color}-100 text-${color}-800`;
    alert.textContent = text;
    alert.classList.remove("hidden");
}

window.onload = () => {
    loadDocuments();
    connectToBridge();
};
</script>

</body>
</html>
